name: Backlog Curator

on:
  schedule:
    - cron: "0 10 * * 1"  # 05:00 CT Mondays
  workflow_dispatch:

concurrency:
  group: backlog-curator
  cancel-in-progress: true

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.NKD_GH_TOKEN }}

      - name: Build image
        run: docker build -t nkd-agents:curator .

      - name: Run curator
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            -e GH_TOKEN="${{ secrets.NKD_GH_TOKEN }}" \
            -e GITHUB_TOKEN="${{ secrets.NKD_GH_TOKEN }}" \
            -e NKD_MODEL="claude-opus-4-7" \
            nkd-agents:curator \
            bash -lc '
              git config --global user.name  "nkd-agents-bot"
              git config --global user.email "nkd-agents-bot@users.noreply.github.com"
              gh auth setup-git
              nkd -p "$(cat .github/nkd/backlog_curator.md)"
            '