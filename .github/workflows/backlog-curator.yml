name: Backlog Curator

on:
  schedule:
    - cron: "0 10 * * 1"  # 05:00 CT Mondays
  workflow_dispatch:

concurrency:
  group: backlog-curator
  cancel-in-progress: true

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.NKD_GH_TOKEN }}

      - name: Build image
        run: docker build -t nkd-agents:curator .

      - name: Run curator
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            -e GH_TOKEN="${{ secrets.NKD_GH_TOKEN }}" \
            -e GITHUB_TOKEN="${{ secrets.NKD_GH_TOKEN }}" \
            -e NKD_MODEL="claude-opus-4-7" \
            nkd-agents:curator \
            bash -lc '
              git config --global user.name  "nkd-agents-bot"
              git config --global user.email "nkd-agents-bot@users.noreply.github.com"
              gh auth setup-git
              nkd -p "
Read docs/framework.md, docs/cli.md, docs/tools.md, README.md, CLAUDE.md.
Run: git log --oneline -n 50
Read BACKLOG.md (skip ## Done).

Add up to 5 new ready items to BACKLOG.md under ## Ready, highest priority first.
Each item: H2 imperative title, status: ready, loc-ceiling (rarely > 100), 2-4 acceptance bullets, non-goals only if over-scoping is likely.
No duplicates. No new runtime deps. Items must be independent of each other.
Prefer items that remove or tighten over items that add. If fewer than 5 good ideas exist, propose fewer.

Then: branch nkd-auto/backlog-\$(date +%Y%m%d), commit, push, open PR titled chore: curate backlog.
"
            '
