name: Nightly Autonomous Dev

on:
  schedule:
    - cron: "0 7 * * *"   # 02:00 CT / 07:00 UTC
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.NKD_GH_TOKEN }}

      - name: Build image
        run: docker build -t nkd-agents:nightly .

      - name: Run orchestrator
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            -e GH_TOKEN="${{ secrets.NKD_GH_TOKEN }}" \
            -e GITHUB_TOKEN="${{ secrets.NKD_GH_TOKEN }}" \
            -e NKD_MODEL="claude-opus-4-7" \
            -e NKD_LOG_LEVEL=20 \
            nkd-agents:nightly \
            bash -lc '
              git config --global user.name  "nkd-agents-bot"
              git config --global user.email "nkd-agents-bot@users.noreply.github.com"
              gh auth setup-git
              nkd -p "$(cat .github/nkd/orchestrator.md)"
            '

      - name: Upload worker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-logs
          path: /tmp/worker-*.log /tmp/review-*.log
          if-no-files-found: ignore