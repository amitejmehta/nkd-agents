name: Issues → PRs

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:

concurrency:
  group: issues-to-prs
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.NKD_GH_TOKEN }}

      - name: Build image
        run: docker build -t nkd-agents:issues .

      - name: Run issues_to_prs.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.NKD_GH_TOKEN }}
          REPO: ${{ github.repository }}
          NKD_MODEL: claude-sonnet-4-6
        run: bash .github/issues_to_prs.sh