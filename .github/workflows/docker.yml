name: Docker Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build (PR / non-main) — sanity check only
      if: github.event_name != 'push' || github.ref != 'refs/heads/main'
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        push: false
        load: true
        tags: nkd-agents:test

    - name: Sanity check container
      if: github.event_name != 'push' || github.ref != 'refs/heads/main'
      run: |
        OUTPUT=$(docker run --rm nkd-agents:test 2>&1 || true)
        if echo "$OUTPUT" | grep -q "nkd-agents"; then
          echo "✓ Container started and CLI loaded correctly"
        else
          echo "✗ Unexpected output:"
          echo "$OUTPUT"
          exit 1
        fi

    - name: Build and push multi-arch to GHCR
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/nkd-agents:latest
          ghcr.io/${{ github.repository_owner }}/nkd-agents:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
